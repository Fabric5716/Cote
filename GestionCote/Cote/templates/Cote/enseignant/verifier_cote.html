{% extends "Cote/enseignant/includes/head.html" %}
{% load static %}

{% block title %}Vérification des cotes | CS KABA{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/verifier_cote.css' %}">
{% endblock %}

{% block body %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="fas fa-check-double"></i> Vérification des cotes</h1>
        <div><span class="badge bg-primary fs-6 p-2">Titulaire</span></div>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Année scolaire</label>
                    <select id="anneeSelect" class="form-select">
                        <option value="">Chargement...</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Classe (titulaire)</label>
                    <input type="text" id="classeInfo" class="form-control" readonly placeholder="Sélectionnez une année">
                </div>
            </div>
        </div>
    </div>

    <div id="cotesContainer">
        <div class="alert alert-info">Sélectionnez l'année scolaire pour charger les données.</div>
    </div>
</div>

<script src="{% static 'js/verifier_cote.js' %}"></script>
{% endblock %}
